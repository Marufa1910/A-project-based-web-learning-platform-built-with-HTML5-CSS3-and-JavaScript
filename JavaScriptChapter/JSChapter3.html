<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS Chapter 3: Number Mastery | Coding Bird</title>

    <link href="../img/logo_name_icon.png" rel="icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Nunito:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #ca1551;
        --accent: #fe6868;
        --code-bg: #1a1e21;
        --bg: #f0f2f5;
        --text: #2c3e50;
        --secondary: #2ecc71;
      }

      body {
        font-family: "Heebo", sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        line-height: 1.6;
      }

      /* --- Navbar --- */
      .navbar-custom {
        background: white;
        height: 75px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 5%;
        box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
        box-sizing: border-box;
      }

      .navbar-brand {
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        font-size: 25px;
        text-decoration: none;
        color: var(--text);
        display: flex;
        align-items: center;
      }

      .nav-links a {
        text-decoration: none;
        color: var(--text);
        margin-left: 20px;
        font-weight: 500;
      }

      /* --- Chapter Nav --- */
      .chapter-nav {
        max-width: 850px;
        margin: 100px auto 20px auto;
        display: flex;
        justify-content: space-between;
        padding: 0 20px;
      }

      .btn-action {
        padding: 10px 20px;
        border-radius: 5px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .btn-prev {
        border: 2px solid #ddd;
        color: #666;
      }
      .btn-next {
        background: var(--primary);
        color: white;
      }

      header {
        text-align: center;
        padding: 40px 20px;
      }

      /* --- Cards --- */
      .card {
        background: white;
        border-radius: 15px;
        padding: 30px;
        margin: 0 auto 35px auto;
        max-width: 850px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      }

      h2 {
        color: var(--primary);
        font-family: "Nunito";
        margin-top: 0;
        font-size: 1.4rem;
        border-left: 5px solid var(--primary);
        padding-left: 15px;
      }

      .output-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px;
        border-bottom: 1px solid #eee;
        position: relative;
        cursor: help;
        transition: 0.2s;
      }

      .output-row:hover {
        background: #fff0f5;
      }

      .output-row::after {
        content: "Syntax: " attr(data-syntax);
        position: absolute;
        bottom: 110%;
        right: 10px;
        background: var(--code-bg);
        color: #50fa7b;
        padding: 8px 12px;
        border-radius: 4px;
        font-family: "Consolas", monospace;
        font-size: 0.8rem;
        visibility: hidden;
        opacity: 0;
        transition: 0.2s;
        z-index: 100;
        white-space: pre;
      }

      .output-row:hover::after {
        visibility: visible;
        opacity: 1;
      }

      .label {
        font-weight: 600;
        font-family: monospace;
        color: #555;
      }
      .result {
        font-weight: bold;
        font-family: "Consolas", monospace;
        color: var(--secondary);
      }
      .description {
        font-size: 0.85em;
        color: #7f8c8d;
        margin: 4px 0 15px 12px;
      }

      footer {
        text-align: center;
        padding: 40px;
        background: #1a1e21;
        color: white;
        margin-top: 50px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar-custom">
      <a href="../index.html" class="navbar-brand">
        <img src="../img/logo_name_icon.png" height="45px" alt="" /> Coding<span
          style="color: var(--primary)"
          >Bird</span
        >
      </a>
      <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="../html.html">HTML</a>
        <a href="../css.html">CSS</a>
        <a href="../js.html" style="color: var(--primary)">JS</a>
      </div>
    </nav>

    <div class="chapter-nav">
      <a href="JSChapter2.html" class="btn-action btn-prev"
        ><i class="fa fa-arrow-left"></i> Previous Chapter</a
      >
      <a href="JSChapter4.html" class="btn-action btn-next"
        >Next Chapter <i class="fa fa-arrow-right"></i
      ></a>
    </div>

    <header>
      <h1 style="font-family: &quot;Nunito&quot;; font-weight: 800">
        Chapter 3: Number Mastery
      </h1>
      <p>Mastering Numbers, Math & BigInt Calculations</p>
    </header>

    <div id="chapter-content"></div>

    <footer>&copy; 2026 Marufa Monjuri | Coding Bird</footer>

    <script>
      function addCard(title) {
        const container = document.getElementById("chapter-content");
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<h2>${title}</h2><div class="card-body"></div>`;
        container.appendChild(card);
        return card.querySelector(".card-body");
      }

      function addToUI(cardBody, label, result, syntax, description = "") {
        const wrapper = document.createElement("div");
        wrapper.innerHTML = `
            <div class="output-row" data-syntax="${syntax}">
                <span class="label">${label}</span>
                <span class="result">${result}</span>
            </div>
            ${description ? `<div class="description">${description}</div>` : ""}
        `;
        cardBody.appendChild(wrapper);
      }

      // 3.1 Random Numbers
      const body31 = addCard("3.1 Generating Random Numbers");
      const random1to6 = Math.floor(Math.random() * 6) + 1;
      addToUI(
        body31,
        "Random Dice Roll",
        random1to6,
        "Math.floor(Math.random() * 6) + 1",
        "Generates a whole number between 1 and 6.",
      );

      // 3.2 Secure Random
      const body32 = addCard("3.2 Secure Random Numbers");
      const buffer = new Uint32Array(1);
      window.crypto.getRandomValues(buffer);
      addToUI(
        body32,
        "Secure Fraction",
        (buffer[0] / 0xffffffff).toFixed(5),
        "crypto.getRandomValues(buffer)",
        "Cryptographically strong randomness.",
      );

      // 3.3 Rounding
      const body33 = addCard("3.3 Rounding to Specific Decimals");
      const rawNum = 19.48938;
      const rounded = Math.round(rawNum * 100) / 100;
      addToUI(
        body33,
        "Rounded (2 Places)",
        rounded,
        "Math.round(n * 10**2) / 10**2",
        "Mathematical rounding precision.",
      );

      // 3.4 Accuracy
      const body34 = addCard("3.4 Preserving Decimal Accuracy");
      addToUI(
        body34,
        "Safe Math (Cents)",
        "$5368.21",
        "totalInCents / 100",
        "Using integers to avoid floating point errors.",
      );

      // 3.5 String to Number
      const body35 = addCard("3.5 Converting Strings");
      addToUI(
        body35,
        "Number('42')",
        Number("42"),
        "Number(str)",
        "Standard conversion.",
      );
      addToUI(
        body35,
        "parseFloat('12px')",
        parseFloat("12px"),
        "parseFloat(str)",
        "Extracts numeric values from strings.",
      );

      // 3.6 Hexadecimal
      const body36 = addCard("3.6 Decimal to Hex");
      addToUI(
        body36,
        "Hex (255)",
        (255).toString(16),
        "num.toString(16)",
        "Converts base-10 to hexadecimal.",
      );

      // 3.7 Degrees & Radians
      const body37 = addCard("3.7 Degrees and Radians");
      addToUI(
        body37,
        "90° to Radians",
        (90 * (Math.PI / 180)).toFixed(4),
        "deg * (Math.PI / 180)",
        "Necessary for Math.sin/cos functions.",
      );

      // 3.8 Arc Length
      const body38 = addCard("3.8 Calculating Arc Length");
      addToUI(
        body38,
        "Arc (r=2, 120°)",
        (120 * (Math.PI / 180) * 2).toFixed(3),
        "rad * radius",
        "Measures distance along a circle's edge.",
      );

      // 3.9 BigInt
      const body39 = addCard("3.9 Large Numbers (BigInt)");
      const huge = BigInt(Number.MAX_SAFE_INTEGER) + 10n;
      addToUI(
        body39,
        "Safe Max + 10",
        huge.toString(),
        "val + 10n",
        "Handles integers beyond the standard limit.",
      );
    </script>
  </body>
</html>
