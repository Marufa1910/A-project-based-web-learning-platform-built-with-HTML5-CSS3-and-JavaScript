<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>High Contrast Calculator | Coding Bird</title>

    <link href="../img/logo_name_icon.png" rel="icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Nunito:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #ca1551;
        --bg-page: #f0f2f5;
        --calc-body: #000000;
        --screen-bg: #1a1a1a;
        --text-main: #ffffff;
        --text-muted: #ffd700;
        --btn-num: #333333;
        --btn-op: #ca1551;
        --btn-special: #555555;
        --btn-equal: #008542;
      }

      body {
        background-color: var(--bg-page);
        margin: 0;
        padding-top: 100px; /* Space for fixed navbar */
        font-family: "Heebo", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      /* --- Consistent Navbar --- */
      .navbar-custom {
        background: white;
        height: 75px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 5%;
        box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
        box-sizing: border-box;
      }

      .navbar-brand {
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        font-size: 25px;
        text-decoration: none;
        color: #2c3e50;
        display: flex;
        align-items: center;
      }

      .nav-links a {
        text-decoration: none;
        color: #2c3e50;
        margin-left: 20px;
        font-weight: 500;
      }

      /* --- Navigation Area --- */
      .chapter-nav {
        max-width: 850px;
        margin: 100px auto 20px auto;
        display: flex;
        justify-content: space-between;
        padding: 0 20px;
      }

      .btn-action {
        padding: 10px 20px;
        border-radius: 5px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 10px;
        border: 2px solid #ddd;
        color: #666;
        background: white;
      }

      .btn-action:hover {
        background: #f8f9fa;
        border-color: var(--primary);
        color: var(--primary);
      }

      /* --- Calculator Styling --- */
      .calculator {
        background: var(--calc-body);
        width: 340px;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        border: 2px solid #444;
        margin-bottom: 50px;
      }

      .display {
        background: var(--screen-bg);
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 20px;
        text-align: right;
        border: 1px solid #333;
      }

      #history {
        color: var(--text-muted);
        font-size: 1rem;
        height: 24px;
        font-weight: 500;
      }

      #result {
        color: var(--text-main);
        font-size: 3rem;
        font-weight: 800;
        overflow: hidden;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      button {
        height: 70px;
        border: 1px solid #444;
        border-radius: 12px;
        font-size: 1.5rem;
        font-weight: 700;
        cursor: pointer;
        transition: 0.1s;
        color: white;
      }

      .num {
        background: var(--btn-num);
      }
      .op {
        background: var(--btn-op);
      }
      .util {
        background: var(--btn-special);
        color: #00e5ff;
      }
      .eq {
        background: var(--btn-equal);
        grid-column: span 2;
      }

      button:hover {
        filter: brightness(1.3);
        border-color: #fff;
      }
      button:active {
        transform: scale(0.95);
      }

      footer {
        width: 100%;
        text-align: center;
        padding: 40px 0;
        background: #1a1e21;
        color: white;
        margin-top: auto;
      }
    </style>
  </head>
  <body>
    <nav class="navbar-custom">
      <a href="../index.html" class="navbar-brand">
        <img src="../img/logo_name_icon.png" height="45px" alt="" /> Coding<span
          style="color: var(--primary)"
          >Bird</span
        >
      </a>
      <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="../html.html">HTML</a>
        <a href="../css.html">CSS</a>
        <a href="../js.html" style="color: var(--primary)">JS</a>
      </div>
    </nav>
    <div class="chapter-nav">
      <a href="JSChapter11.html" class="btn-action btn-prev"
        ><i class="fa fa-arrow-left"></i> Previous Chapter</a
      >
      <a href="../js.html" class="btn-action">
        <i class="fa-solid fa-list"></i> Back to JS Menu
      </a>
    </div>

    <div class="calculator">
      <div class="display">
        <div id="history"></div>
        <div id="result">0</div>
      </div>
      <div class="grid">
        <button class="util" onclick="clearDisplay()">AC</button>
        <button class="util" onclick="deleteLast()">
          <i class="fa-solid fa-backspace"></i>
        </button>
        <button class="op" onclick="appendOperator('%')">%</button>
        <button class="op" onclick="appendOperator('/')">÷</button>

        <button class="num" onclick="appendNumber('7')">7</button>
        <button class="num" onclick="appendNumber('8')">8</button>
        <button class="num" onclick="appendNumber('9')">9</button>
        <button class="op" onclick="appendOperator('*')">×</button>

        <button class="num" onclick="appendNumber('4')">4</button>
        <button class="num" onclick="appendNumber('5')">5</button>
        <button class="num" onclick="appendNumber('6')">6</button>
        <button class="op" onclick="appendOperator('-')">−</button>

        <button class="num" onclick="appendNumber('1')">1</button>
        <button class="num" onclick="appendNumber('2')">2</button>
        <button class="num" onclick="appendNumber('3')">3</button>
        <button class="op" onclick="appendOperator('+')">+</button>

        <button class="num" onclick="appendNumber('0')">0</button>
        <button class="num" onclick="appendNumber('.')">.</button>
        <button class="eq" onclick="calculate()">=</button>
      </div>
    </div>

    <footer>&copy; 2026 Marufa Monjuri | Coding Bird</footer>

    <script>
      let currentInput = "0";
      let previousInput = "";
      let operator = null;
      let shouldReset = false;

      const resDisp = document.getElementById("result");
      const histDisp = document.getElementById("history");

      function update() {
        resDisp.innerText = currentInput;
      }

      function appendNumber(n) {
        if (currentInput === "0" || shouldReset) {
          currentInput = n;
          shouldReset = false;
        } else {
          if (!(n === "." && currentInput.includes("."))) currentInput += n;
        }
        update();
      }

      function appendOperator(op) {
        if (operator !== null) calculate();
        previousInput = currentInput;
        operator = op;
        histDisp.innerText = `${previousInput} ${operator}`;
        shouldReset = true;
      }

      function clearDisplay() {
        currentInput = "0";
        previousInput = "";
        operator = null;
        histDisp.innerText = "";
        update();
      }

      function deleteLast() {
        if (currentInput.length > 1) {
          currentInput = currentInput.slice(0, -1);
        } else {
          currentInput = "0";
        }
        update();
      }

      function calculate() {
        if (!operator || shouldReset) return;
        const p = parseFloat(previousInput);
        const c = parseFloat(currentInput);
        let res = 0;

        switch (operator) {
          case "+":
            res = p + c;
            break;
          case "-":
            res = p - c;
            break;
          case "*":
            res = p * c;
            break;
          case "/":
            res = c !== 0 ? p / c : "Error";
            break;
          case "%":
            res = p % c;
            break;
        }

        currentInput = res.toString();
        operator = null;
        histDisp.innerText = "";
        update();
        shouldReset = true;
      }
    </script>
  </body>
</html>
