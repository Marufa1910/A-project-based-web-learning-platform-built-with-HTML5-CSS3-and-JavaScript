<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chapter 5: CSS Colors | Coding Bird</title>

    <link href="../img/logo_name_icon.png" rel="icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Nunito:wght@600;700;800&family=Fira+Code:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #ca1551;
        --accent: #fe6868;
        --code-bg: #1e1e2e;
        --bg: #f8f9fa;
        --text: #2c3e50;
        --tag-color: #f92672;
        --attr-color: #a6e22e;
        --val-color: #e6db74;
        --comment-color: #75715e;
        --preview-bg: #ffffff;
      }

      body {
        font-family: "Heebo", sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        line-height: 1.6;
      }

      .navbar-custom {
        background: white;
        height: 75px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 5%;
        box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
        box-sizing: border-box;
      }

      .navbar-brand {
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        font-size: 25px;
        text-decoration: none;
        color: var(--text);
      }

      .chapter-nav {
        max-width: 850px;
        margin: 100px auto 20px auto;
        display: flex;
        justify-content: space-between;
        padding: 0 20px;
      }

      .btn-action {
        padding: 10px 20px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .btn-prev {
        border: 2px solid #ddd;
        color: #666;
      }
      .btn-next {
        background: var(--primary);
        color: white;
      }

      header {
        text-align: center;
        padding: 40px 20px;
      }

      .card {
        background: white;
        border-radius: 20px;
        padding: 30px;
        margin: 0 auto 35px auto;
        max-width: 850px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        border: 1px solid #edf2f7;
      }

      h2 {
        color: var(--primary);
        font-family: "Nunito";
        margin-top: 0;
        font-size: 1.5rem;
      }

      .code-block {
        background: var(--code-bg);
        color: #f8f8f2;
        padding: 20px;
        border-radius: 12px;
        font-family: "Fira Code", monospace;
        font-size: 0.85rem;
        margin: 15px 0;
        position: relative;
        overflow-x: auto;
        white-space: pre-wrap;
      }

      .live-result {
        background: #fff;
        border: 2px solid #e2e8f0;
        border-left: 5px solid var(--primary);
        padding: 20px;
        border-radius: 12px;
        margin-top: 15px;
      }

      .label {
        font-size: 0.7rem;
        font-weight: 800;
        text-transform: uppercase;
        color: #a0aec0;
        margin-bottom: 5px;
        display: block;
      }

      .t {
        color: var(--tag-color);
        font-weight: 500;
      }
      .a {
        color: var(--attr-color);
      }
      .v {
        color: var(--val-color);
      }

      .swatch {
        display: inline-block;
        width: 20px;
        height: 20px;
        border-radius: 4px;
        vertical-align: middle;
        margin-right: 8px;
        border: 1px solid #ddd;
      }

      footer {
        text-align: center;
        padding: 40px;
        background: #1a202c;
        color: white;
        margin-top: 50px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar-custom">
      <a href="../index.html" class="navbar-brand">
        Coding<span style="color: var(--primary)">Bird</span>
      </a>
      <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="../html.html">HTML</a>
        <a href="../css.html" style="color: var(--primary)">CSS</a>
        <a href="../js.html">JS</a>
      </div>
    </nav>

    <div class="chapter-nav">
      <a href="CSSChapter4.html" class="btn-action btn-prev"
        ><i class="fa fa-arrow-left"></i> Previous</a
      >
      <a href="CSSChapter6.html" class="btn-action btn-next"
        >Next Chapter <i class="fa fa-arrow-right"></i
      ></a>
    </div>

    <header>
      <h1 style="font-family: &quot;Nunito&quot;; font-weight: 800">
        Chapter 5: CSS Colors
      </h1>
      <p>Mastering color systems: Names, Hexadecimal, and RGB.</p>
    </header>

    <div id="chapter-content"></div>

    <footer>&copy; 2026 Marufa Monjuri | Coding Bird</footer>

    <script>
      const content = document.getElementById("chapter-content");

      function createSection(title, icon, desc, codeHtml, previewHtml) {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <h2><i class="fa ${icon}"></i> ${title}</h2>
          <p style="color: #4a5568;">${desc}</p>
          <span class="label">CSS Code</span>
          <div class="code-block">${codeHtml}</div>
          <span class="label">Browser Preview</span>
          <div class="live-result">${previewHtml}</div>
        `;
        content.appendChild(card);
      }

      // 5.1 Color Names
      createSection(
        "5.1 Color Names",
        "fa-palette",
        "Modern browsers support 140+ standard color names (e.g., red, tomato, skyblue, gold).",
        `<span class="t">p</span> { <br> &nbsp;&nbsp;<span class="a">background-color</span>: <span class="v">red</span>; <br> &nbsp;&nbsp;<span class="a">color</span>: <span class="v">white</span>; <br> }`,
        "<p style='background-color: red; color: white; padding: 10px; margin: 0;'>This paragraph uses named colors.</p>",
      );

      // 5.2 HEX Colors
      createSection(
        "5.2 HEX Colors (#rrggbb)",
        "fa-hashtag",
        "HEX uses base-16 values. You can use 3 digits for shorthand (#ff0) or 8 digits to include alpha/transparency (#ff000088).",
        `<span class="t">p</span> { <br> &nbsp;&nbsp;<span class="a">color</span>: <span class="v">#ff0000</span>; <br> &nbsp;&nbsp;<span class="a">background-color</span>: <span class="v">#ffff00</span>; <br> }`,
        "<p style='color: #ff0000; background-color: #ffff00; padding: 10px; margin: 0;'>HEX code rendering: Red text on Yellow.</p>",
      );

      // 5.3 RGB & RGBA
      createSection(
        "5.3 RGB & RGBA Colors",
        "fa-adjust",
        "RGB uses values from 0-255. RGBA adds an 'Alpha' channel (0.0 to 1.0) for transparency.",
        `<span class="t">p</span> { <br> &nbsp;&nbsp;<span class="a">color</span>: <span class="v">rgb(255, 0, 0)</span>; <br> &nbsp;&nbsp;<span class="a">background-color</span>: <span class="v">rgba(255, 255, 0, 0.5)</span>; <br> }`,
        "<p style='color: rgb(255, 0, 0); background-color: rgba(255, 255, 0, 0.5); padding: 10px; margin: 0;'>RGBA: Semi-transparent yellow background.</p>",
      );

      // 5.4 Grey Colors
      createSection(
        "5.4 Grey Tones",
        "fa-tint-slash",
        "Whenever the Red, Green, and Blue values are equal, the result is a shade of grey.",
        `<span class="t">.dark-grey</span> { <span class="a">color</span>: <span class="v">#333</span>; } <br> <span class="t">.light-grey</span> { <span class="a">color</span>: <span class="v">rgb(200, 200, 200)</span>; }`,
        "<div><span class='swatch' style='background:#333'></span> #333 (Dark) <br> <span class='swatch' style='background:#888'></span> #888 (Medium) <br> <span class='swatch' style='background:#ccc'></span> #ccc (Light)</div>",
      );
    </script>
  </body>
</html>
