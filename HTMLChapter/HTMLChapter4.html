<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chapter 4: Semantic HTML | Coding Bird</title>

    <link href="../img/logo_name_icon.png" rel="icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Nunito:wght@600;700;800&family=Fira+Code:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #ca1551;
        --accent: #fe6868;
        --code-bg: #1e1e2e;
        --bg: #f8f9fa;
        --text: #2c3e50;
        --tag-color: #f92672;
        --attr-color: #a6e22e;
        --val-color: #e6db74;
        --comment-color: #75715e;
      }

      body {
        font-family: "Heebo", sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        line-height: 1.6;
      }

      .navbar-custom {
        background: white;
        height: 75px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 5%;
        box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
        box-sizing: border-box;
      }

      .navbar-brand {
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        font-size: 25px;
        text-decoration: none;
        color: var(--text);
      }

      .chapter-nav {
        max-width: 850px;
        margin: 100px auto 20px auto;
        display: flex;
        justify-content: space-between;
        padding: 0 20px;
      }

      .btn-action {
        padding: 10px 20px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .btn-prev {
        border: 2px solid #ddd;
        color: #666;
      }
      .btn-next {
        background: var(--primary);
        color: white;
      }

      header {
        text-align: center;
        padding: 40px 20px;
      }

      .card {
        background: white;
        border-radius: 20px;
        padding: 30px;
        margin: 0 auto 35px auto;
        max-width: 850px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        border: 1px solid #edf2f7;
      }

      h2 {
        color: var(--primary);
        font-family: "Nunito";
        margin-top: 0;
        font-size: 1.5rem;
      }

      .code-block {
        background: var(--code-bg);
        color: #f8f8f2;
        padding: 20px;
        border-radius: 12px;
        font-family: "Fira Code", monospace;
        font-size: 0.85rem;
        margin: 15px 0;
        overflow-x: auto;
      }

      .live-result {
        background: #fff;
        border: 2px solid #e2e8f0;
        border-left: 5px solid var(--primary);
        padding: 20px;
        border-radius: 12px;
        margin-top: 15px;
      }

      .label {
        font-size: 0.7rem;
        font-weight: 800;
        text-transform: uppercase;
        color: #a0aec0;
        margin-bottom: 5px;
        display: block;
      }

      .t {
        color: var(--tag-color);
      }
      .a {
        color: var(--attr-color);
      }
      .v {
        color: var(--val-color);
      }

      .semantic-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 10px;
        margin-top: 20px;
      }

      .tag-pill {
        background: #f1f5f9;
        padding: 8px 12px;
        border-radius: 6px;
        font-family: "Fira Code", monospace;
        font-size: 0.85rem;
        border-left: 3px solid var(--primary);
      }

      footer {
        text-align: center;
        padding: 40px;
        background: #1a202c;
        color: white;
        margin-top: 50px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar-custom">
      <a href="../index.html" class="navbar-brand">
        Coding<span style="color: var(--primary)">Bird</span>
      </a>
      <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="../html.html" style="color: var(--primary)">HTML</a>
        <a href="../css.html">CSS</a>
        <a href="../js.html">JS</a>
      </div>
    </nav>

    <div class="chapter-nav">
      <a href="HTMLChapter3.html" class="btn-action btn-prev"
        ><i class="fa fa-arrow-left"></i> Previous</a
      >
      <a href="HTMLChapter5.html" class="btn-action btn-next"
        >Next Chapter <i class="fa fa-arrow-right"></i
      ></a>
    </div>

    <header>
      <h1 style="font-family: &quot;Nunito&quot;; font-weight: 800">
        Semantic HTML
      </h1>
      <p>Building meaningful web structures for browsers and search engines.</p>
    </header>

    <div id="chapter-content"></div>

    <footer>&copy; 2026 Marufa Monjuri | Coding Bird</footer>

    <script>
      const content = document.getElementById("chapter-content");

      function createSection(title, icon, desc, codeHtml, previewHtml) {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <h2><i class="fa ${icon}"></i> ${title}</h2>
          <p style="color: #4a5568;">${desc}</p>
          <span class="label">HTML Source Code</span>
          <div class="code-block">${codeHtml}</div>
          <span class="label">Live Result</span>
          <div class="live-result">${previewHtml}</div>
        `;
        content.appendChild(card);
      }

      // 4.1.1 Blockquote
      createSection(
        "Blockquote & Quotes",
        "fa-quote-left",
        "Use &lt;blockquote&gt; for long citations with a 'cite' attribute, and &lt;q&gt; for short, inline quotes.",
        `<span class="t">&lt;blockquote</span> <span class="a">cite</span>=<span class="v">"https://en.wikipedia.org"</span><span class="t">&gt;</span><br>&nbsp;&nbsp;HTML is the standard markup language.<br><span class="t">&lt;/blockquote&gt;</span>`,
        `<blockquote style="border-left: 4px solid #ddd; padding-left: 15px; margin: 0; color: #555;">HTML is the standard markup language for documents designed to be displayed in a web browser.</blockquote>`,
      );

      // 4.1.2 Address
      createSection(
        "The Address Element",
        "fa-envelope",
        "Defines contact information for the author/owner. It usually renders in italics.",
        `<span class="t">&lt;address&gt;</span><br>&nbsp;&nbsp;Philadelphia, PA 12345<br>&nbsp;&nbsp;<span class="t">&lt;a</span> <span class="a">href</span>=<span class="v">"mailto:hi@mail.com"</span><span class="t">&gt;</span>Email Us<span class="t">&lt;/a&gt;</span><br><span class="t">&lt;/address&gt;</span>`,
        `<address>12345 South St. Philadelphia, PA 12345<br><a href="#">contact@neodtruman.com</a></address>`,
      );

      // 4.1.3 Details & Summary
      createSection(
        "Interactive Widgets",
        "fa-caret-square-down",
        "The &lt;details&gt; tag creates a toggleable dropdown, with &lt;summary&gt; acting as the label.",
        `<span class="t">&lt;details&gt;</span><br>&nbsp;&nbsp;<span class="t">&lt;summary&gt;</span>Click to see more<span class="t">&lt;/summary&gt;</span><br>&nbsp;&nbsp;<span class="t">&lt;p&gt;</span>Hidden content here!<span class="t">&lt;/p&gt;</span><br><span class="t">&lt;/details&gt;</span>`,
        `<details><summary style="cursor:pointer; font-weight:bold;">Learn More About HTML</summary><p style="margin-top:10px;">HTML is the standard markup language for Web pages.</p></details>`,
      );

      // 4.1.4 Figure & Figcaption
      createSection(
        "Figures & Captions",
        "fa-image",
        "Groups an image with its description using &lt;figure&gt; and &lt;figcaption&gt;.",
        `<span class="t">&lt;figure&gt;</span><br>&nbsp;&nbsp;<span class="t">&lt;img</span> <span class="a">src</span>=<span class="v">"apple.jpg"</span> <span class="a">alt</span>=<span class="v">"Apple"</span> <span class="t">/&gt;</span><br>&nbsp;&nbsp;<span class="t">&lt;figcaption&gt;</span>Fig.1 - My apple<span class="t">&lt;/figcaption&gt;</span><br><span class="t">&lt;/figure&gt;</span>`,
        `<figure style="text-align:center;"><div style="width:100px; height:60px; background:#ff4d4d; margin:auto; border-radius:10px; display:flex; align-items:center; justify-content:center; color:white;">IMAGE</div><figcaption style="font-style:italic; font-size:0.9rem; margin-top:5px;">Fig.1 - My apple</figcaption></figure>`,
      );

      // 4.2 Semantic Layout
      const layoutCard = document.createElement("div");
      layoutCard.className = "card";
      layoutCard.innerHTML = `
        <h2><i class="fa fa-layer-group"></i> Semantic Layout Elements</h2>
        <p>These elements define the actual structure of a page, helping SEO and Accessibility.</p>
        
        <div class="semantic-grid">
          <div class="tag-pill">&lt;header&gt; - Intro content</div>
          <div class="tag-pill">&lt;nav&gt; - Navigation links</div>
          <div class="tag-pill">&lt;main&gt; - Primary content</div>
          <div class="tag-pill">&lt;section&gt; - Document theme</div>
          <div class="tag-pill">&lt;article&gt; - Independent post</div>
          <div class="tag-pill">&lt;aside&gt; - Sidebar content</div>
          <div class="tag-pill">&lt;footer&gt; - Closing info</div>
        </div>
      `;
      content.appendChild(layoutCard);

      // 4.3 Semantic Formatting
      createSection(
        "Semantic Formatting",
        "fa-font",
        "Use &lt;strong&gt; and &lt;em&gt; instead of &lt;b&gt; and &lt;i&gt; to give text importance.",
        `<span class="t">&lt;p&gt;</span>This is <span class="t">&lt;strong&gt;</span>critical<span class="t">&lt;/strong&gt;</span> and <span class="t">&lt;em&gt;</span>emphasized<span class="t">&lt;/em&gt;</span>.<span class="t">&lt;/p&gt;</span>`,
        "This is <strong>critical</strong> and <em>emphasized</em>.",
      );
    </script>
  </body>
</html>
