<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chapter 1: Getting to know HTML | Coding Bird</title>

    <link href="../img/logo_name_icon.png" rel="icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Nunito:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #ca1551; /* Coding Bird Crimson */
        --accent: #fe6868;
        --code-bg: #000000;
        --bg: #f0f2f5;
        --text: #2c3e50;
        --tag-color: #ff4dc9;
        --attr-color: #50fa7b;
        --val-color: #f1fa8c;
        --comment-color: #d9d9d9;
      }

      body {
        font-family: "Heebo", sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        line-height: 1.6;
      }

      /* --- Full Fixed Navbar --- */
      .navbar-custom {
        background: white;
        height: 75px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 5%;
        box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
        box-sizing: border-box;
      }

      .navbar-brand {
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        font-size: 25px;
        text-decoration: none;
        color: var(--text);
        display: flex;
        align-items: center;
      }

      .nav-links a {
        text-decoration: none;
        color: var(--text);
        margin-left: 20px;
        font-weight: 500;
      }

      /* --- Chapter Navigation Buttons --- */
      .chapter-nav {
        max-width: 850px;
        margin: 100px auto 20px auto;
        display: flex;
        justify-content: space-between;
        padding: 0 20px;
      }

      .btn-action {
        padding: 10px 20px;
        border-radius: 5px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .btn-prev {
        border: 2px solid #ddd;
        color: #666;
      }
      .btn-next {
        background: var(--primary);
        color: white;
      }
      .btn-prev:hover {
        background: #eee;
      }
      .btn-next:hover {
        opacity: 0.9;
      }

      header {
        text-align: center;
        padding: 40px 20px;
      }

      header .badge {
        background: var(--primary);
        color: white;
        padding: 5px 15px;
        border-radius: 50px;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 2px;
      }

      /* --- Card System --- */
      .card {
        background: white;
        border-radius: 15px;
        padding: 30px;
        margin: 0 auto 35px auto;
        max-width: 850px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(0, 0, 0, 0.05);
      }

      h2 {
        color: var(--primary);
        font-family: "Nunito";
        display: flex;
        align-items: center;
        margin-top: 0;
      }
      h2 i {
        margin-right: 15px;
        color: var(--accent);
      }

      .code-block {
        background: var(--code-bg);
        color: #f8f8f2;
        padding: 20px;
        border-radius: 10px;
        font-family: "Consolas", monospace;
        font-size: 0.95rem;
        margin: 15px 0;
        border-left: 5px solid var(--primary);
        overflow-x: auto;
      }

      /* Syntax Colors */
      .t {
        color: var(--tag-color);
      }
      .a {
        color: var(--attr-color);
      }
      .v {
        color: var(--val-color);
      }
      .c {
        color: var(--comment-color);
        font-style: italic;
      }

      .description {
        color: #636e72;
        margin-bottom: 20px;
      }

      footer {
        text-align: center;
        padding: 40px;
        background: #1a1e21;
        color: white;
      }
    </style>
  </head>
  <body>
    <nav class="navbar-custom">
      <a href="../index.html" class="navbar-brand">
        <img src="../img/logo_name_icon.png" height="45px" alt="" /> Coding<span
          style="color: var(--primary)"
          >Bird</span
        >
      </a>
      <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="../html.html" style="color: var(--primary)">HTML</a>
        <a href="../css.html">CSS</a>
        <a href="../js.html">JS</a>
      </div>
    </nav>

    <div class="chapter-nav">
      <a href="../html.html" class="btn-action btn-prev"
        ><i class="fa fa-arrow-left"></i> Course Map</a
      >
      <a href="HTMLChapter2.html" class="btn-action btn-next"
        >Chapter 2 <i class="fa fa-arrow-right"></i
      ></a>
    </div>

    <header>
      <span class="badge">Chapter 01</span>
      <h1
        style="
          font-family: &quot;Nunito&quot;;
          font-weight: 800;
          margin-top: 15px;
        "
      >
        Getting to know HTML
      </h1>
      <p>Your journey into web development starts here.</p>
    </header>

    <div id="chapter-content"></div>

    <footer>&copy; 2026 Marufa Monjuri | Coding Bird</footer>

    <script>
      const content = document.getElementById("chapter-content");

      function createSection(title, icon, desc, codeHtml, extraHtml = "") {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
                <h2><i class="fa ${icon}"></i> ${title}</h2>
                <p class="description">${desc}</p>
                <div class="code-block">${codeHtml}</div>
                ${extraHtml}
            `;
        content.appendChild(card);
      }

      // 1.1 Intro
      createSection(
        "1.1 Defining HTML",
        "fa-info-circle",
        "HTML (HyperText Markup Language) describes the structure of web pages. It uses 'marking up' to tell the browser how to display text and images.",
        `<span class="t">&lt;p&gt;</span>Hello World<span class="t">&lt;/p&gt;</span>`,
      );

      // 1.2 Element Types
      createSection(
        "1.2 Anatomy of an Element",
        "fa-cut",
        "A standard element consists of an opening tag, content, and a closing tag. Some are 'Empty' (like br or img) and do not have a closing tag.",
        `<span class="t">&lt;h1&gt;</span>Opening Tag<span class="t">&lt;/h1&gt;</span><br><span class="c">&lt;!-- Empty Element Below --&gt;</span><br><span class="t">&lt;br /&gt;</span>`,
      );

      // 1.3 Skeleton
      createSection(
        "1.3 The Mandatory Skeleton",
        "fa-dice-d6",
        "Every HTML document must follow this basic structural hierarchy to be valid.",
        `<span class="t">&lt;!DOCTYPE html&gt;</span><br><span class="t">&lt;html&gt;</span><br>&nbsp;&nbsp;<span class="t">&lt;head&gt;</span> ... <span class="t">&lt;/head&gt;</span><br>&nbsp;&nbsp;<span class="t">&lt;body&gt;</span> ... <span class="t">&lt;/body&gt;</span><br><span class="t">&lt;/html&gt;</span>`,
      );

      // 1.4 Character Encoding
      createSection(
        "1.4 Metadata & Encoding",
        "fa-globe",
        "We use UTF-8 to handle all characters globally. The lang attribute defines the language for screen readers and search engines.",
        `<span class="t">&lt;meta</span> <span class="a">charset</span>=<span class="v">"UTF-8"</span> <span class="t">/&gt;</span><br><span class="t">&lt;html</span> <span class="a">lang</span>=<span class="v">"en"</span><span class="t">&gt;</span>`,
      );

      // 1.5 Favicon
      createSection(
        "1.5 Browser Tab Icon (Favicon)",
        "fa-star",
        "Place a link tag in the head section to define the small icon visible in the browser tab.",
        `<span class="t">&lt;link</span> <span class="a">rel</span>=<span class="v">"icon"</span> <span class="a">href</span>=<span class="v">"favicon.ico"</span> <span class="a">type</span>=<span class="v">"image/x-icon"</span> <span class="t">/&gt;</span>`,
      );

      // 1.6 Comments
      createSection(
        "1.6 Developer Comments",
        "fa-comment-alt",
        "Comments are invisible to the user. Use them to organize your code or leave notes for yourself.",
        `<span class="c">&lt;!-- This is a comment: It will not appear on the website --&gt;</span>`,
      );
    </script>
  </body>
</html>
