<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chapter 9: HTML Events | Coding Bird</title>

    <link href="../img/logo_name_icon.png" rel="icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Nunito:wght@600;700;800&family=Fira+Code:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #ca1551;
        --accent: #fe6868;
        --code-bg: #1e1e2e;
        --bg: #f8f9fa;
        --text: #2c3e50;
        --tag-color: #f92672;
        --attr-color: #a6e22e;
        --val-color: #e6db74;
      }

      body {
        font-family: "Heebo", sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        line-height: 1.6;
      }

      .navbar-custom {
        background: white;
        height: 75px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 5%;
        box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
        box-sizing: border-box;
      }

      .navbar-brand {
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        font-size: 25px;
        text-decoration: none;
        color: var(--text);
      }

      .chapter-nav {
        max-width: 850px;
        margin: 100px auto 20px auto;
        display: flex;
        justify-content: space-between;
        padding: 0 20px;
      }

      .btn-action {
        padding: 10px 20px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .btn-prev {
        border: 2px solid #ddd;
        color: #666;
      }
      .btn-next {
        background: var(--primary);
        color: white;
      }

      header {
        text-align: center;
        padding: 40px 20px;
      }

      .card {
        background: white;
        border-radius: 20px;
        padding: 30px;
        margin: 0 auto 35px auto;
        max-width: 850px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        border: 1px solid #edf2f7;
      }

      h2 {
        color: var(--primary);
        font-family: "Nunito";
        margin-top: 0;
        font-size: 1.5rem;
      }

      .code-block {
        background: var(--code-bg);
        color: #f8f8f2;
        padding: 20px;
        border-radius: 12px;
        font-family: "Fira Code", monospace;
        font-size: 0.85rem;
        margin: 15px 0;
        overflow-x: auto;
      }

      .live-result {
        background: #fff;
        border: 2px solid #e2e8f0;
        border-left: 5px solid var(--primary);
        padding: 20px;
        border-radius: 12px;
        margin-top: 15px;
      }

      .label {
        font-size: 0.7rem;
        font-weight: 800;
        text-transform: uppercase;
        color: #a0aec0;
        margin-bottom: 5px;
        display: block;
      }
      .t {
        color: var(--tag-color);
      }
      .a {
        color: var(--attr-color);
      }
      .v {
        color: var(--val-color);
      }

      footer {
        text-align: center;
        padding: 40px;
        background: #1a202c;
        color: white;
        margin-top: 50px;
      }

      input[type="text"],
      select {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <nav class="navbar-custom">
      <a
        href="../index.html"
        class="navbar-brand"
        style="
          display: flex;
          align-items: center;
          gap: 8px;
          text-decoration: none;
          color: var(--text);
        "
      >
        <img
          src="../img/logo_name_icon.png"
          alt="Logo"
          style="height: 30px; width: auto"
        />

        <span
          style="
            font-family: &quot;Nunito&quot;, sans-serif;
            font-weight: 800;
            font-size: 25px;
          "
        >
          Coding<span style="color: var(--primary)">Bird</span>
        </span>
      </a>

      <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="../html.html" style="color: var(--primary)">HTML</a>
        <a href="../css.html">CSS</a>
        <a href="../js.html">JS</a>
      </div>
    </nav>

    <div class="chapter-nav">
      <a href="HTMLChapter8.html" class="btn-action btn-prev"
        ><i class="fa fa-arrow-left"></i> Previous</a
      >
      <a href="HTMLChapter10.html" class="btn-action btn-next"
        >Next Chapter <i class="fa fa-arrow-right"></i
      ></a>
    </div>

    <header>
      <h1 style="font-family: &quot;Nunito&quot;; font-weight: 800">
        Chapter 9: HTML Events
      </h1>
      <p>Making web pages interactive with JavaScript event handlers.</p>
    </header>

    <div id="chapter-content"></div>

    <footer>&copy; 2026 Marufa Monjuri | Coding Bird</footer>

    <script>
      const content = document.getElementById("chapter-content");

      function createSection(title, icon, desc, codeHtml, previewHtml) {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <h2><i class="fa ${icon}"></i> ${title}</h2>
          <p style="color: #4a5568;">${desc}</p>
          <span class="label">HTML Source Code</span>
          <div class="code-block">${codeHtml}</div>
          <span class="label">Live Result</span>
          <div class="live-result">${previewHtml}</div>
        `;
        content.appendChild(card);
      }

      // 9.1 Window Events
      createSection(
        "Window Events (onload & onresize)",
        "fa-window-restore",
        "Events that trigger based on the browser window state. 'onload' fires when everything is loaded, and 'onresize' fires when the window size changes.",
        `<span class="t">&lt;body</span> <span class="a">onload</span>=<span class="v">"alert('Loaded')"</span> <span class="a">onresize</span>=<span class="v">"myFunc()"</span><span class="t">&gt;</span>`,
        `<div style="padding: 10px; border: 1px dashed #ca1551; text-align: center;">
          <p>Try resizing your browser window to trigger the <b>onresize</b> event!</p>
          <script>
            window.onresize = function() { console.log("Window resized!"); };
          <\/script>
        </div>`,
      );

      // 9.2 Form Focus Events
      createSection(
        "Form: onfocus & onblur",
        "fa-eye",
        "'onfocus' triggers when an element is clicked/selected. 'onblur' triggers when the user clicks away from the element.",
        `<span class="t">&lt;input</span> <span class="a">onfocus</span>=<span class="v">"this.style.background='yellow'"</span> <span class="a">onblur</span>=<span class="v">"alert('Hi ' + this.value)"</span><span class="t">&gt;</span>`,
        `First Name (Focus test): <input type="text" onfocus="this.style.background='yellow'" onblur="this.style.background='white'"><br><br>
         Enter Name (Blur test): <input type="text" id="fname_blur" onblur="if(this.value) alert('Hi ' + this.value)" placeholder="Type here and click away">`,
      );

      // 9.3 Value Change Events
      createSection(
        "Form: onchange & oninput",
        "fa-exchange-alt",
        "'onchange' fires when a value is committed (like selection). 'oninput' fires immediately as you type.",
        `<span class="t">&lt;select</span> <span class="a">onchange</span>=<span class="v">"eventHandler()"</span><span class="t">&gt;</span>`,
        `<select id="my-select" onchange="alert('You selected: ' + this.value)">
          <option value="Audi">Audi</option><option value="BMW">BMW</option><option value="Volvo">Volvo</option>
         </select>
         <p>Type below to see live output:</p>
         <input type="text" oninput="document.getElementById('out').innerHTML = 'You wrote: ' + this.value">
         <p id="out" style="color:var(--primary); font-weight:bold;"></p>`,
      );

      // 9.4 Keyboard Events
      createSection(
        "Keyboard: onkeydown & onkeyup",
        "fa-keyboard",
        "Detect physical key interactions. 'onkeyup' is perfect for tasks like auto-capitalization.",
        `<span class="t">&lt;input</span> <span class="a">onkeyup</span>=<span class="v">"this.value = this.value.toUpperCase()"</span><span class="t">&gt;</span>`,
        `<p>This field transforms text to UPPERCASE on key release:</p>
         <input type="text" onkeyup="this.value = this.value.toUpperCase()" placeholder="type something...">`,
      );

      // 9.5 Mouse Events
      createSection(
        "Mouse: Click & Hover",
        "fa-mouse-pointer",
        "Events triggered by mouse actions like single/double clicks or moving the cursor over elements.",
        `<span class="t">&lt;button</span> <span class="a">onclick</span>=<span class="v">"alert('Clicked')"</span><span class="t">&gt;</span>`,
        `<button onclick="alert('Single Click!')" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:4px; cursor:pointer;">Click Me</button>
         <button ondblclick="alert('Double Click!')" style="margin-left:10px; padding:8px 15px; border-radius:4px; cursor:pointer;">Double Click Me</button>
         <p onmouseover="this.style.fontSize='25px'" onmouseout="this.style.fontSize='16px'" style="margin-top:15px; border:1px solid #ddd; padding:5px;">Hover over this text to enlarge!</p>`,
      );

      // 9.6 Mouse Down/Up
      createSection(
        "Mouse: onmousedown & onmouseup",
        "fa-mouse",
        "Tracks the specific moment a mouse button is pressed and when it is released.",
        `<span class="t">&lt;p</span> <span class="a">onmousedown</span>=<span class="v">"style.color='red'"</span><span class="t">&gt;</span>`,
        `<p style="font-weight:bold; cursor:pointer; user-select:none;" 
            onmousedown="this.style.color='red'; this.innerHTML='Mouse Button Down!'" 
            onmouseup="this.style.color='blue'; this.innerHTML='Mouse Button Up!'">
            Click and Hold this text!
         </p>`,
      );

      // 9.7 Clipboard Events
      createSection(
        "Clipboard: Copy, Cut & Paste",
        "fa-paste",
        "Detect when a user interacts with the system clipboard via keyboard shortcuts (Ctrl+C, Ctrl+V) or context menus.",
        `<span class="t">&lt;input</span> <span class="a">oncopy</span>=<span class="v">"alert('Copied')"</span><span class="t">&gt;</span>`,
        `<input type="text" value="Try to copy or cut this text" oncopy="alert('You copied the text!')" oncut="alert('You cut the text!')" style="margin-bottom:10px;">
         <input type="text" placeholder="Try to paste text here" onpaste="alert('You pasted text!')">`,
      );
    </script>
  </body>
</html>
