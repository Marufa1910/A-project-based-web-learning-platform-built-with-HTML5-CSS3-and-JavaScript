<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chapter 3: HTML Styles | Coding Bird</title>

    <link href="../img/logo_name_icon.png" rel="icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Nunito:wght@600;700;800&family=Fira+Code:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #ca1551;
        --accent: #fe6868;
        --code-bg: #1e1e2e; /* Deep midnight blue for better visualization */
        --bg: #f8f9fa;
        --text: #2c3e50;
        --tag-color: #f92672; /* Pinkish-red for tags */
        --attr-color: #a6e22e; /* Green for attributes */
        --val-color: #e6db74; /* Yellow for values */
        --comment-color: #75715e;
        --preview-bg: #ffffff;
      }

      body {
        font-family: "Heebo", sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        line-height: 1.6;
      }

      /* Navbar */
      .navbar-custom {
        background: white;
        height: 75px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 5%;
        box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
        box-sizing: border-box;
      }

      .navbar-brand {
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        font-size: 25px;
        text-decoration: none;
        color: var(--text);
      }

      /* Layout Containers */
      .chapter-nav {
        max-width: 850px;
        margin: 100px auto 20px auto;
        display: flex;
        justify-content: space-between;
        padding: 0 20px;
      }

      .btn-action {
        padding: 10px 20px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .btn-prev {
        border: 2px solid #ddd;
        color: #666;
      }
      .btn-next {
        background: var(--primary);
        color: white;
      }

      header {
        text-align: center;
        padding: 40px 20px;
      }

      /* Visual Card System */
      .card {
        background: white;
        border-radius: 20px;
        padding: 30px;
        margin: 0 auto 35px auto;
        max-width: 850px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        border: 1px solid #edf2f7;
      }

      h2 {
        color: var(--primary);
        font-family: "Nunito";
        margin-top: 0;
        font-size: 1.5rem;
      }

      /* Improved Code Block */
      .code-block {
        background: var(--code-bg);
        color: #f8f8f2;
        padding: 20px;
        border-radius: 12px;
        font-family: "Fira Code", monospace;
        font-size: 0.9rem;
        margin: 15px 0;
        position: relative;
        overflow-x: auto;
      }

      /* Live Rendering Box */
      .live-result {
        background: #fff;
        border: 2px solid #e2e8f0;
        border-left: 5px solid var(--primary);
        padding: 20px;
        border-radius: 12px;
        margin-top: 15px;
      }

      .label {
        font-size: 0.7rem;
        font-weight: 800;
        text-transform: uppercase;
        color: #a0aec0;
        margin-bottom: 10px;
        display: block;
      }

      /* Syntax Highlighting */
      .t {
        color: var(--tag-color);
        font-weight: 500;
      }
      .a {
        color: var(--attr-color);
      }
      .v {
        color: var(--val-color);
      }

      footer {
        text-align: center;
        padding: 40px;
        background: #1a202c;
        color: white;
        margin-top: 50px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar-custom">
      <a href="../index.html" class="navbar-brand">
        Coding<span style="color: var(--primary)">Bird</span>
      </a>
      <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="../html.html" style="color: var(--primary)">HTML</a>
        <a href="../css.html">CSS</a>
        <a href="../js.html">JS</a>
      </div>
    </nav>

    <div class="chapter-nav">
      <a href="HTMLChapter2.html" class="btn-action btn-prev"
        ><i class="fa fa-arrow-left"></i> Previous</a
      >
      <a href="HTMLChapter4.html" class="btn-action btn-next"
        >Next Chapter <i class="fa fa-arrow-right"></i
      ></a>
    </div>

    <header>
      <h1 style="font-family: &quot;Nunito&quot;; font-weight: 800">
        HTML Formatting & Styles
      </h1>
      <p>How the code looks vs. How the user sees it.</p>
    </header>

    <div id="chapter-content"></div>

    <footer>&copy; 2026 Marufa Monjuri | Coding Bird</footer>

    <script>
      const content = document.getElementById("chapter-content");

      function createSection(title, icon, desc, codeHtml, previewHtml) {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <h2><i class="fa ${icon}"></i> ${title}</h2>
          <p style="color: #4a5568;">${desc}</p>
          <span class="label">Code Editor</span>
          <div class="code-block">${codeHtml}</div>
          <span class="label">Browser View</span>
          <div class="live-result">${previewHtml}</div>
        `;
        content.appendChild(card);
      }

      // 1. Bold
      createSection(
        "Bold Text",
        "fa-bold",
        "Use the &lt;b&gt; tag to emphasize text with weight.",
        `<span class="t">&lt;p&gt;</span>This is <span class="t">&lt;b&gt;</span>bold<span class="t">&lt;/b&gt;</span> text.<span class="t">&lt;/p&gt;</span>`,
        "This is <b>bold</b> text.",
      );

      // 2. Italic
      createSection(
        "Italic Text",
        "fa-italic",
        "Use &lt;i&gt; to slant text, often used for technical terms or thoughts.",
        `<span class="t">&lt;p&gt;</span>This is <span class="t">&lt;i&gt;</span>italic<span class="t">&lt;/i&gt;</span> text.<span class="t">&lt;/p&gt;</span>`,
        "This is <i>italic</i> text.",
      );

      // 3. Underline
      createSection(
        "Underline",
        "fa-underline",
        "The &lt;u&gt; tag draws a line beneath the text.",
        `<span class="t">&lt;p&gt;</span>This is <span class="t">&lt;u&gt;</span>underlined<span class="t">&lt;/u&gt;</span> text.<span class="t">&lt;/p&gt;</span>`,
        "This is <u>underlined</u> text.",
      );

      // 4. Strikethrough (The line through the text)
      createSection(
        "Strikethrough",
        "fa-strikethrough",
        "The &lt;s&gt; tag shows text that is no longer correct with a line through it.",
        `<span class="t">&lt;p&gt;</span>Price: <span class="t">&lt;s&gt;</span>$50<span class="t">&lt;/s&gt;</span> $30!<span class="t">&lt;/p&gt;</span>`,
        "Price: <s>$50</s> $30!",
      );

      // 5. Highlight
      createSection(
        "Mark / Highlight",
        "fa-highlighter",
        "The &lt;mark&gt; tag acts like a yellow highlighter pen.",
        `<span class="t">&lt;p&gt;</span>This is <span class="t">&lt;mark&gt;</span>important<span class="t">&lt;/mark&gt;</span>.<span class="t">&lt;/p&gt;</span>`,
        "This is <mark>important</mark>.",
      );

      // 6. Subscript & Superscript
      createSection(
        "Sub & Sup",
        "fa-superscript",
        "Subscript (below) and Superscript (above).",
        `<span class="t">&lt;p&gt;</span>H<span class="t">&lt;sub&gt;</span>2<span class="t">&lt;/sub&gt;</span>O and 10<span class="t">&lt;sup&gt;</span>th<span class="t">&lt;/sup&gt;</span><span class="t">&lt;/p&gt;</span>`,
        "H<sub>2</sub>O and 10<sup>th</sup>",
      );

      // 7. Style Attribute
      createSection(
        "Inline Styles",
        "fa-paint-brush",
        "The style attribute allows you to change color and size directly.",
        `<span class="t">&lt;p</span> <span class="a">style</span>=<span class="v">"color: red; font-size: 24px"</span><span class="t">&gt;</span>Style Me!<span class="t">&lt;/p&gt;</span>`,
        "<p style='color: red; font-size: 24px; margin:0;'>Style Me!</p>",
      );
    </script>
  </body>
</html>
